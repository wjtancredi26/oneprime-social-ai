services:
  postgres:
    image: postgres:16-alpine
    container_name: oneprime-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oneprime}
      POSTGRES_USER: ${POSTGRES_USER:-oneprime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oneprime123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oneprime} -d ${POSTGRES_DB:-oneprime}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: oneprime-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://oneprime:oneprime123@postgres:5432/oneprime?schema=public}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: oneprime-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules

volumes:
  postgres-data:
